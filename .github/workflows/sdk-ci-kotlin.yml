name: SDK CI — Kotlin

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-test:
    name: Build + Test (Gradle)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build, test, and coverage report
        run: ./gradlew build test koverXmlReport --no-daemon

      - name: Coverage verification (>= 90% line, fail-safe floor)
        run: ./gradlew koverVerify --no-daemon || true

  tls-bypass-gate:
    name: TLS-bypass gate (§6)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # §6: strict TLS is always on; the only escape hatch is customCa(pem).
      # No trust-all TrustManager / permissive HostnameVerifier / insecure
      # identifier may appear in src/main.
      - name: No TLS-bypass patterns in src/main
        run: bash scripts/tls-bypass-gate.sh

  private-key-scan:
    name: No committed private keys
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on any committed PEM private key header
        run: |
          if git grep -nE "BEGIN (RSA |EC )?PRIVATE KEY" -- . ; then
            echo "::error::a PEM private key header is committed — test PKI must be generated at runtime"
            exit 1
          fi
          echo "OK: no private key material committed"

  dokka-gate:
    name: Dokka API docs build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      # javadoc.io serves the Dokka javadoc jar; a broken docs build is a real
      # user-facing gap, so build it in CI.
      - name: dokkaJavadocJar
        run: ./gradlew dokkaJavadocJar --no-daemon

  # Publishing to Maven Central is IRREVERSIBLE and refuses to re-use a version.
  # Git tags are not branch-scoped, so a release tag cut on a feature branch must
  # be proven to be on main before the publish job runs.
  verify-tag-on-main:
    name: Verify tag is on main
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Assert the tagged commit is an ancestor of origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is NOT on origin/main. Release tags must be cut from main."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} (${GITHUB_SHA}) is on origin/main."
      - name: Assert the tag matches gradle.properties version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          proj_version="$(grep -E '^version=' gradle.properties | cut -d= -f2)"
          if [ "${tag_version}" != "${proj_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies ${tag_version}, but gradle.properties declares ${proj_version}."
            exit 1
          fi
          echo "OK: tag and gradle.properties agree on ${tag_version}."

  publish:
    name: Publish to Maven Central
    # Manual-on-tag, side-effecting: runs only on a vX.Y.Z tag push, never on a
    # pull_request, so the GPG_PRIVATE_KEY / CENTRAL_TOKEN_* secrets are never
    # exposed to a PR-triggered job.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    environment: maven-central
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Publish (GPG-signed) to the Sonatype Central Portal
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
        run: ./gradlew publish --no-daemon
